services:
  postgres:
    image: pgvector/pgvector:pg16
    container_name: claimflow-db
    ports:
      - "5432:5432"
    environment:
      POSTGRES_DB: claimflow
      POSTGRES_USER: claimflow_admin
      POSTGRES_PASSWORD: claimflow_dev_2026
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U claimflow_admin -d claimflow"]
      interval: 5s
      timeout: 3s
      retries: 5

  rabbitmq:
    image: rabbitmq:4-management
    container_name: claimflow-mq
    ports:
      - "5672:5672"
      - "15672:15672"
    environment:
      RABBITMQ_DEFAULT_USER: claimflow
      RABBITMQ_DEFAULT_PASS: claimflow_dev_2026
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "check_port_connectivity"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  pgdata:
